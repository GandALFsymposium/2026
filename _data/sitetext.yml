        institution: University of Munich
        country: Germany
      - name: Salvatore La Torre
        institution: University of Salerno
        country: Italy
      - name: Angelo Montanari
        institution: University of Udine
        country: Italy
      - name: Mimmo Parente
        institution: University of Salerno
        country: Italy
      - name: Jean-François Raskin
